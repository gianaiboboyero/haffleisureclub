# Legacy: Oracle VM + local Postgres. Use Supabase instead — see docs/DEPLOY_QUICKSTART.md
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: haff
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: haff
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U haff -d haff"]
      interval: 10s
      timeout: 5s
      retries: 8

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      API_ONLY: "true"
      DATABASE_URL: postgresql://haff:${POSTGRES_PASSWORD}@postgres:5432/haff
      DIRECT_URL: postgresql://haff:${POSTGRES_PASSWORD}@postgres:5432/haff
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-}
      FEEDBACK_HASH_SECRET: ${FEEDBACK_HASH_SECRET:-haff-cadiz}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      ABLY_API_KEY: ${ABLY_API_KEY:-}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_DOMAIN: ${API_DOMAIN}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
